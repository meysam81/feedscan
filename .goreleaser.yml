# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: feedscan

env:
  - GITHUB_TOKEN
  - HOMEBREW_TAP_GITHUB_TOKEN

before:
  hooks:
    - go mod tidy

builds:
  - main: .
    binary: feedscan
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    ignore:
      - goarch: arm
        goos: windows
      - goarch: arm64
        goos: windows

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- tolower .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: true

release:
  mode: keep-existing

homebrew_casks:
  - name: feedscan
    description: Find active RSS/Atom feeds linked from any web page.
    homepage: https://github.com/meysam81/feedscan
    license: Apache-2.0
    commit_msg_template: Brew formula update for {{ .ProjectName }} version {{ .Tag }}
    commit_author:
      name: "{{ .Env.GITHUB_ACTOR }}"
      email: "{{ .Env.GITHUB_ACTOR_ID }}+{{ .Env.GITHUB_ACTOR }}@users.noreply.github.com"
    repository:
      name: homebrew-tap
      owner: meysam81
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/feedscan"]
          end
          puts "feedscan installed successfully."
          puts ""
          puts "Quick start:"
          puts "   feedscan -url example.com"
          puts ""
          puts "Documentation:"
          puts "   https://github.com/meysam81/feedscan"
